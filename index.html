<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Forte FIP IE Energia Solar II</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--gold:#C9A84C;--gold-light:#E2C47A;--gold-glow:rgba(201,168,76,0.15);--bg:#080807;--bg2:#0F0E0C;--bg3:#141210;--bg4:#1C1914;--border:rgba(201,168,76,0.13);--border2:rgba(201,168,76,0.26);--text:#F0EDE6;--text2:#C8C0AE;--text3:#7A7060;--green:#4CAF7A;--red:#E05252;--r:4px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}
#ls{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
#ls.fade{opacity:0;pointer-events:none}
.lb{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:.2em;color:var(--gold-light);text-transform:uppercase}
.ls2{font-size:10px;letter-spacing:.25em;color:var(--text3);text-transform:uppercase;margin-top:-10px}
.lbw{width:240px;height:1px;background:var(--border2);margin-top:16px}
.lbb{height:1px;background:var(--gold);width:0%;transition:width .15s}
.lst{font-size:11px;color:var(--text3);margin-top:8px;min-height:16px;text-align:center}
header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 36px;height:60px;display:flex;align-items:center;justify-content:space-between}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;letter-spacing:.15em;color:var(--gold-light);text-transform:uppercase}
.brand-sub{font-size:10px;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin-top:2px}
.badge{font-size:10px;letter-spacing:.1em;color:var(--text3);border:1px solid var(--border);padding:4px 11px;border-radius:2px;text-transform:uppercase}
.hdate{font-size:11px;color:var(--text3)}
.app{display:flex;height:calc(100vh - 60px)}
.sidebar{width:190px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.ss{padding:10px 16px 4px;font-size:10px;letter-spacing:.16em;color:var(--text3);text-transform:uppercase}
.ni{display:block;width:100%;text-align:left;background:none;border:none;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.ni:hover{color:var(--text);background:var(--bg3)}
.ni.active{color:var(--gold-light);background:var(--gold-glow);border-left-color:var(--gold)}
.ni.nd{color:var(--text3);cursor:not-allowed;opacity:.4}
main{flex:1;overflow-y:auto;padding:24px 28px 40px}
.pb{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding:12px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);flex-wrap:wrap}
.pb label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.pi{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:5px 9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;color-scheme:dark}
.pi:focus{outline:none;border-color:var(--gold)}
.btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.05em;cursor:pointer;transition:all .15s;text-transform:uppercase}
.bg{background:none;color:var(--text2)}.bg:hover{background:var(--bg4);color:var(--text)}
.bgo{background:var(--gold-glow);border-color:var(--gold);color:var(--gold-light)}.bgo:hover{background:rgba(201,168,76,0.25)}
.st{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold-light);letter-spacing:.05em;margin-bottom:18px}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:20px}
.kc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.kl{font-size:10px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;font-weight:500}
.kv{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--gold-light);line-height:1;letter-spacing:.03em}
.ku{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);margin-left:3px;font-weight:400}
.ks{font-size:11px;color:var(--text2);margin-top:6px}
.kd{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;letter-spacing:.02em;color:var(--gold-light)}
.kp{font-size:12px;margin-top:4px;color:var(--text2)}
.dp{color:var(--green)!important}.dn{color:var(--red)!important}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:18px 18px 14px;margin-bottom:14px}
.ct{font-size:11px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;font-weight:500}
.cto{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tb{padding:4px 10px;border-radius:2px;border:1px solid var(--border2);font-size:10px;letter-spacing:.07em;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;text-transform:uppercase;background:none;color:var(--text3)}
.tb.on{background:var(--gold-glow);border-color:var(--gold);color:var(--gold-light)}
.cw{position:relative}
.tcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.tsc{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--bg4);border-bottom:1px solid var(--border2)}
th{padding:10px 14px;text-align:right;font-size:10px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;font-weight:500;white-space:nowrap}
th:first-child{text-align:left}
td{padding:9px 14px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
td:first-child{text-align:left;color:var(--text);font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg4)}
.dv{height:1px;background:var(--border);margin:22px 0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="ls">
  <div>
    <div class="lb">Casa Forte</div>
    <div class="ls2">FIP IE Energia Solar II</div>
  </div>
  <div style="text-align:center">
    <div class="lbw"><div class="lbb" id="lbb"></div></div>
    <div class="lst" id="lst">Iniciando...</div>
  </div>
</div>
<header>
  <div>
    <div class="brand-name">Casa Forte Investimentos</div>
    <div class="brand-sub">FIP IE Energia Solar II</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="badge">FIP IE II</div>
    <div class="hdate" id="hdate"></div>
  </div>
</header>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="ss">Visao</div>
    <button class="ni active" data-panel="geral" onclick="showPanel('geral')">Visao Geral</button>
    <button class="ni" data-panel="grupo" onclick="showPanel('grupo')">Analise por Grupo</button>
    <div class="ss">Usinas</div>
  </nav>
  <main id="mc"></main>
</div>
<script>
var SID="1166FEk1VdBNxO9xiwsaXCAU6h5wKJO_7gwa1uyFCFxk";
var GVIZ="https://docs.google.com/spreadsheets/d/"+SID+"/gviz/tq?tqx=out:csv&sheet=";
var TODAY=new Date();TODAY.setDate(1);TODAY.setHours(0,0,0,0);
var SHEETS=["Petrolina 1","Petrolina 2","Cedro 1","Cedro 2","Aracati 1","Brejo Santo","Jaguaribe 1","Aruna 1 ","Aruna 2","Aruna 3"];
var MNAMES=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
var MMAP={jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11};
var C={goldL:"#E2C47A",green:"#4CAF7A",blue:"#4A90D9",purple:"#9B59B6",bar:"rgba(201,168,76,0.55)"};
var allData={};
var filterStart=null,filterEnd=null;
var charts={};
var loaded=0;
var activePanel="geral";

function parseDate(s){
  if(!s)return null;
  var m=s.trim().toLowerCase().match(/^([a-z]+)[.\-]+(\d+)$/);
  if(!m)return null;
  var mon=MMAP[m[1].slice(0,3)];
  if(mon===undefined)return null;
  var yr=parseInt(m[2]);
  if(yr<100)yr+=2000;
  var d=new Date(yr,mon,1);
  return d>TODAY?null:d;
}
function fmtDate(d){
  if(!d)return"";
  return MNAMES[d.getMonth()]+"/"+String(d.getFullYear()).slice(2);
}
function parseNum(s){
  if(!s||!s.trim()||s.trim()==="-")return null;
  var c=s.trim().replace(/\s/g,"");
  if(c.indexOf(",")>=0&&c.indexOf(".")>=0)c=c.replace(/\./g,"").replace(",",".");
  else if(c.indexOf(",")>=0)c=c.replace(",",".");
  var n=parseFloat(c);
  return isNaN(n)?null:n;
}
function fmtMWh(kwh){
  if(kwh==null)return"--";
  return(kwh/1000).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+" MWh";
}
function toMWh(kwh){return kwh!=null?kwh/1000:null;}
function fmtBRL(v){
  if(v==null)return"--";
  if(Math.abs(v)>=1e6)return"R$ "+(v/1e6).toFixed(2)+"M";
  return"R$ "+v.toLocaleString("pt-BR",{maximumFractionDigits:0});
}
function fmtPct(r){return r==null?"--":(r*100).toFixed(1)+"%";}
function devCls(dv){if(dv==null)return"";return dv>=0?"dp":"dn";}
function toMI(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function killChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function parseCSVLine(line){
  var r=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===","&&!inQ){r.push(cur);cur="";continue;}
    cur+=ch;
  }
  r.push(cur);return r;
}
function parseCSV(text){
  var lines=text.split("\n").map(function(l){return l.trim();}).filter(function(l){return l;});
  if(!lines.length)return[];
  var hdr=parseCSVLine(lines[0]);
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCSVLine(lines[i]);
    var obj={};
    for(var j=0;j<hdr.length;j++)obj[hdr[j].trim()]=(cols[j]||"").trim();
    rows.push(obj);
  }
  return rows;
}
function processSheet(rows){
  var data=[];
  for(var i=0;i<rows.length;i++){
    var row=rows[i];
    var dateRaw=row["Data"]||Object.values(row)[0]||"";
    var date=parseDate(dateRaw);
    if(!date)continue;
    var conc=parseNum(row["Energia Injetada (Concessionaria)"])||parseNum(row["Energia Injetada (Concession\u00e1ria)"]);
    var superv=parseNum(row["Energia Injetada(Supervis\u00f3rio)"])||parseNum(row["Energia Injetada (Supervis\u00f3rio)"]);
    var p50=parseNum(row["Energia Projetada P50"]);
    var p75=parseNum(row["Energia Projetada P75"]);
    var media=parseNum(row["Energia Projetada M\u00e9dia"])||parseNum(row["Energia Projetada Media"]);
    var contrat=parseNum(row["Energia Contratual"]);
    if(contrat!=null&&contrat<10)contrat=null; // guard: valores < 10 kWh são ruído/erro
    var vur=parseNum(row["VUR (R$/Kwh)"])||parseNum(row["VUR (R$/KWh)"]);
    var comp=parseNum(row["Energia Compensada"]);
    data.push({date:date,dateStr:fmtDate(date),conc:conc,superv:superv,p50:p50,p75:p75,media:media,contrat:contrat,vur:vur,comp:comp});
  }
  data.sort(function(a,b){return a.date-b.date;});
  var first=-1;
  for(var k=0;k<data.length;k++){if(data[k].superv!=null&&data[k].superv>0){first=k;break;}}
  if(first<0)return[];
  return data.slice(first);
}
function toYM(d){return d.getFullYear()*100+d.getMonth();}
function applyFilter(rows){
  var ys=filterStart?toYM(filterStart):null;
  var ye=filterEnd?toYM(filterEnd):null;
  return rows.filter(function(r){
    var ym=toYM(r.date);
    if(ys&&ym<ys)return false;
    if(ye&&ym>ye)return false;
    return true;
  });
}
function fetchSheet(name){
  var url=GVIZ+encodeURIComponent(name);
  return fetch(url).then(function(res){
    if(!res.ok)throw new Error("HTTP "+res.status);
    return res.text();
  }).then(function(text){
    allData[name]=processSheet(parseCSV(text));
  }).catch(function(e){
    console.warn("Erro:",name,e.message);
    allData[name]=[];
  }).then(function(){
    loaded++;
    document.getElementById("lbb").style.width=Math.round(loaded/SHEETS.length*100)+"%";
    document.getElementById("lst").textContent="Carregando "+name+"... ("+loaded+"/"+SHEETS.length+")";
  });
}
function loadAll(){
  Promise.all(SHEETS.map(fetchSheet)).then(function(){
    document.getElementById("lst").textContent="Montando dashboard...";
    var allDates=[];
    Object.values(allData).forEach(function(rows){rows.forEach(function(r){if(r.date)allDates.push(r.date);});});
    if(allDates.length){
      filterStart=new Date(Math.min.apply(null,allDates));
      filterEnd=new Date(Math.max.apply(null,allDates));
    }
    buildUI();
    setTimeout(function(){
      var ls=document.getElementById("ls");
      ls.classList.add("fade");
      setTimeout(function(){ls.style.display="none";},500);
    },200);
  });
}
function buildUI(){
  document.getElementById("hdate").textContent=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
  var sidebar=document.getElementById("sidebar");
  var usinas=SHEETS.filter(function(n){return allData[n]&&allData[n].length>0;});
  var noData=SHEETS.filter(function(n){return!allData[n]||!allData[n].length;});
  usinas.forEach(function(name){
    var btn=document.createElement("button");
    btn.className="ni";btn.dataset.panel=name;btn.textContent=displayName(name);
    btn.onclick=function(){showPanel(name);};
    sidebar.appendChild(btn);
  });
  if(noData.length){
    var sec=document.createElement("div");sec.className="ss";sec.textContent="Em breve";sidebar.appendChild(sec);
    noData.forEach(function(name){
      var btn=document.createElement("button");btn.className="ni nd";btn.textContent=displayName(name);btn.disabled=true;sidebar.appendChild(btn);
    });
  }
  showPanel("geral");
}
function showPanel(name){
  activePanel=name;
  document.querySelectorAll(".ni").forEach(function(b){b.classList.toggle("active",b.dataset.panel===name);});
  Object.keys(charts).forEach(killChart);
  var mc=document.getElementById("mc");mc.innerHTML="";
  mc.appendChild(buildPeriodBar());
  if(name==="geral")renderGeral(mc);else if(name==="grupo")renderGrupo(mc);else renderUsina(name,mc);
}
function buildPeriodBar(){
  var allDates=[];
  Object.values(allData).forEach(function(rows){rows.forEach(function(r){if(r.date)allDates.push(r.date);});});
  var minD=new Date(Math.min.apply(null,allDates));
  var maxD=new Date(Math.max.apply(null,allDates));
  var bar=document.createElement("div");bar.className="pb";
  var html="<label>Periodo</label>";
  html+='<input type="month" class="pi" id="ps" value="'+toMI(filterStart||minD)+'">';
  html+='<span style="color:var(--text3)">até</span>';
  html+='<input type="month" class="pi" id="pe" value="'+toMI(filterEnd||maxD)+'">';
  html+='<button class="btn bgo" id="bap">Aplicar</button>';
  html+='<button class="btn bg" id="bfu">Periodo completo</button>';
  bar.innerHTML=html;
  bar.querySelector("#bap").onclick=function(){
    var s=bar.querySelector("#ps").value;
    var e=bar.querySelector("#pe").value;
    if(s){var ps2=s.split("-");filterStart=new Date(parseInt(ps2[0]),parseInt(ps2[1])-1,1);}
    if(e){var pe2=e.split("-");filterEnd=new Date(parseInt(pe2[0]),parseInt(pe2[1])-1,1);}
    showPanel(activePanel);
  };
  bar.querySelector("#bfu").onclick=function(){
    filterStart=minD;filterEnd=maxD;
    bar.querySelector("#ps").value=toMI(minD);
    bar.querySelector("#pe").value=toMI(maxD);
    showPanel(activePanel);
  };
  return bar;
}
function chartOpts(yFmt){
  return{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:"index",intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:"#1C1914",borderColor:"rgba(201,168,76,0.3)",borderWidth:1,
        titleColor:"#E2C47A",bodyColor:"#C8C0AE",
        callbacks:{label:function(ctx){return" "+ctx.dataset.label+": "+(ctx.parsed.y!=null?yFmt(ctx.parsed.y):"--");}}
      }
    },
    scales:{
      x:{ticks:{color:"#7A7060",font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:24},grid:{color:"rgba(201,168,76,0.05)"}},
      y:{ticks:{color:"#7A7060",font:{size:10},callback:yFmt},grid:{color:"rgba(201,168,76,0.05)"}}
    }
  };
}
function setupToggle(btnId,chart,idx){
  var btn=document.getElementById(btnId);
  if(!btn||!chart)return;
  btn.onclick=function(){
    var ds=chart.data.datasets[idx];if(!ds)return;
    ds.hidden=!ds.hidden;
    btn.classList.toggle("on",!ds.hidden);
    chart.update();
  };
}
function sum(rows,key){return rows.reduce(function(a,r){return a+(r[key]||0);},0);}
function displayName(name){return name.replace(/([A-Za-záéíóúãõâêôç]+)([0-9]+)$/,"$1 $2");}

function renderGeral(el){
  var title=document.createElement("div");title.className="st";title.textContent="Visao Geral do Fundo";el.appendChild(title);
  var usinas=SHEETS.filter(function(n){return allData[n]&&allData[n].length>0;});
  var totC=0,totCt=0,totCp=0,totRec=0;
  var mmap={};
  usinas.forEach(function(name){
    var rows=applyFilter(allData[name]);
    rows.forEach(function(r){
      if(r.conc!=null)totC+=r.conc;
      if(r.contrat!=null)totCt+=r.contrat;
      if(r.comp!=null)totCp+=r.comp;
      if(r.conc!=null&&r.vur!=null)totRec+=r.conc*r.vur;
      var k=r.dateStr;
      if(!mmap[k])mmap[k]={date:r.date,dateStr:r.dateStr,conc:0,contrat:0,p50:0,p50n:0,p75:0,p75n:0,media:0,median:0};
      if(r.conc!=null)mmap[k].conc+=r.conc;
      if(r.contrat!=null)mmap[k].contrat+=r.contrat;
      if(r.p50!=null){mmap[k].p50+=r.p50;mmap[k].p50n++;}
      if(r.p75!=null){mmap[k].p75+=r.p75;mmap[k].p75n++;}
      if(r.media!=null){mmap[k].media+=r.media;mmap[k].median++;}
    });
  });
  var ratio=totCt>0?totC/totCt:null;
  var devPct=ratio!=null?(ratio-1)*100:null;
  var kg=document.createElement("div");kg.className="kg";
  function kcard(label,val,unit,sub){return'<div class="kc"><div class="kl">'+label+'</div><div class="kv">'+val+'<span class="ku">'+unit+'</span></div><div class="ks">'+sub+'</div></div>';}
  kg.innerHTML=
    kcard("Energia Total Injetada",(totC/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}),"MWh","Concessionaria - periodo filtrado")+
    kcard("Energia Contratual",(totCt/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}),"MWh","Total contratado no periodo")+
    kcard("Energia Compensada",(totCp/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}),"MWh","Total compensada no periodo")+
    kcard("Receita Total Estimada",fmtBRL(totRec),"","VUR x Criterio de remuneracao")+
    '<div class="kc"><div class="kl">Performance Geral</div><div class="kd">'+(devPct!=null?(devPct>=0?"+":"")+devPct.toFixed(1)+"%":"--")+'</div><div class="kp '+devCls(devPct)+'">'+(ratio!=null?fmtPct(ratio)+" do contratual":"--")+'</div></div>'+
    kcard("Usinas Ativas",usinas.length,"usinas",(SHEETS.length-usinas.length)+" em implantacao");
  el.appendChild(kg);

  var months=Object.values(mmap).sort(function(a,b){return a.date-b.date;});
  var labels=months.map(function(m){return m.dateStr;});
  var concArr=months.map(function(m){return m.conc/1000;});
  var ctArr=months.map(function(m){return m.contrat>0?m.contrat/1000:null;});
  var p50Arr=months.map(function(m){return m.p50n>0?m.p50/1000:null;});
  var p75Arr=months.map(function(m){return m.p75n>0?m.p75/1000:null;});
  var mediaArr=months.map(function(m){return m.median>0?m.media/1000:null;});

  var gc=document.createElement("div");gc.className="cc";
  gc.innerHTML='<div class="ct">Geracao Consolidada (MWh)</div><div class="cto"><button class="tb on" id="tgct">Contratual</button><button class="tb" id="tgp50">P50</button><button class="tb" id="tgp75">P75</button><button class="tb" id="tgmed">Media P50-P75</button></div>';
  var gcw=document.createElement("div");gcw.className="cw";gcw.style.height="260px";
  var gcv=document.createElement("canvas");
  gcw.appendChild(gcv);gc.appendChild(gcw);
  el.appendChild(gc);

  setTimeout(function(){
    charts["cg"]=new Chart(gcv,{
      data:{labels:labels,datasets:[
        {type:"bar",label:"Injetada",data:concArr,backgroundColor:C.bar,borderWidth:0,order:3},
        {type:"line",label:"Contratual",data:ctArr,borderColor:C.goldL,borderWidth:2,borderDash:[5,3],pointRadius:0,tension:.3,fill:false,order:1},
        {type:"line",label:"P50",data:p50Arr,borderColor:C.green,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true},
        {type:"line",label:"P75",data:p75Arr,borderColor:C.purple,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true},
        {type:"line",label:"Media P50-P75",data:mediaArr,borderColor:C.blue,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true}
      ]},
      options:chartOpts(function(v){return v!=null?v.toLocaleString("pt-BR",{maximumFractionDigits:1})+" MWh":"";})
    });
    setupToggle("tgct",charts["cg"],1);
    setupToggle("tgp50",charts["cg"],2);
    setupToggle("tgp75",charts["cg"],3);
    setupToggle("tgmed",charts["cg"],4);
  },50);

  var dv=document.createElement("div");dv.className="dv";el.appendChild(dv);
  var tt=document.createElement("div");tt.className="st";tt.style.fontSize="16px";tt.textContent="Resumo por Usina";el.appendChild(tt);
  var tbody="";
  usinas.forEach(function(name){
    var rows=applyFilter(allData[name]);
    var c=sum(rows,"conc"),ct=sum(rows,"contrat"),rx=rows.reduce(function(a,r){return a+(r.conc&&r.vur?r.conc*r.vur:0);},0);
    var rt=ct>0?c/ct:null,dv2=rt!=null?(rt-1)*100:null;
    var lastReal=null;for(var i=rows.length-1;i>=0;i--){if(rows[i].conc!=null){lastReal=rows[i];break;}}
    tbody+="<tr><td>"+displayName(name)+"</td><td>"+(c/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" MWh</td><td>"+(ct>0?(ct/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" MWh":"--")+"</td><td style='color:var(--gold-light);font-weight:600'>"+(rt!=null?fmtPct(rt):"--")+"</td><td class='"+devCls(dv2)+"'>"+(dv2!=null?(dv2>=0?"+":"")+dv2.toFixed(1)+"%":"--")+"</td><td>"+fmtBRL(rx)+"</td><td>"+(lastReal?lastReal.dateStr:"--")+"</td></tr>";
  });
  var tc=document.createElement("div");tc.className="tcard";
  tc.innerHTML='<div class="tsc"><table><thead><tr><th style="text-align:left">Usina</th><th>Injetada</th><th>Contratual</th><th>Performance</th><th>Desvio</th><th>Receita Est.</th><th>Ultimo mes</th></tr></thead><tbody>'+tbody+'</tbody></table></div>';
  el.appendChild(tc);
}

function renderUsina(name,el){
  var allRows=allData[name]||[];
  if(!allRows.length){el.innerHTML='<div style="padding:20px;color:var(--text3)">Sem dados disponiveis.</div>';return;}
  var rows=applyFilter(allRows);
  var isFullPeriod=toYM(filterStart)===toYM(new Date(Math.min.apply(null,allRows.map(function(r){return r.date;}))))&&toYM(filterEnd)===toYM(new Date(Math.max.apply(null,allRows.map(function(r){return r.date;}))));
  var pl=isFullPeriod?allRows[0].dateStr+" - "+allRows[allRows.length-1].dateStr:fmtDate(filterStart)+" - "+fmtDate(filterEnd);
  var title=document.createElement("div");title.className="st";title.textContent=displayName(name);el.appendChild(title);
  var totC=sum(rows,"conc"),totCt=sum(rows,"contrat"),totCp=sum(rows,"comp");
  var totRx=rows.reduce(function(a,r){return a+(r.conc&&r.vur?r.conc*r.vur:0);},0);
  var ratio=totCt>0?totC/totCt:null,devPct=ratio!=null?(ratio-1)*100:null;
  var kg=document.createElement("div");kg.className="kg";
  function kcard(label,val,unit,sub){return'<div class="kc"><div class="kl">'+label+'</div><div class="kv">'+val+'<span class="ku">'+unit+'</span></div><div class="ks">'+sub+'</div></div>';}
  kg.innerHTML=
    kcard("Injetada Total",rows.length?(totC/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}):"--",rows.length?"MWh":"",pl)+
    kcard("Contratual Total",totCt>0?(totCt/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}):"--",totCt>0?"MWh":"",pl)+
    '<div class="kc"><div class="kl">Performance Acumulada</div><div class="kd">'+(devPct!=null?(devPct>=0?"+":"")+devPct.toFixed(1)+"%":"--")+'</div><div class="kp '+devCls(devPct)+'">'+(ratio!=null?fmtPct(ratio)+" do contratual":"--")+'</div></div>'+
    kcard("Energia Compensada",rows.length?(totCp/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}):"--",rows.length?"MWh":"",pl)+
    kcard("Receita Estimada",fmtBRL(totRx),"",totCp>0?"VUR x Compensada":"VUR x Concessionaria");
  el.appendChild(kg);

  var labels=rows.map(function(r){return r.dateStr;});
  var concD=rows.map(function(r){return toMWh(r.conc);});
  var ctD=rows.map(function(r){return r.contrat>0?toMWh(r.contrat):null;});
  var p50D=rows.map(function(r){return toMWh(r.p50);});
  var p75D=rows.map(function(r){return toMWh(r.p75);});
  var medD=rows.map(function(r){return toMWh(r.media);});
  var eid="ec"+name.replace(/[^a-z0-9]/gi,"");
  var ec=document.createElement("div");ec.className="cc";
  ec.innerHTML='<div class="ct">Geracao de Energia (MWh)</div><div class="cto"><button class="tb on" id="ect'+name+'">Contratual</button><button class="tb" id="ep50'+name+'">P50</button><button class="tb" id="ep75'+name+'">P75</button><button class="tb" id="emed'+name+'">Media P50-P75</button></div><div class="cw" style="height:280px"><canvas id="'+eid+'"></canvas></div>';
  el.appendChild(ec);
  setTimeout(function(){
    var ctx=document.getElementById(eid);if(!ctx)return;
    charts[eid]=new Chart(ctx,{
      data:{labels:labels,datasets:[
        {type:"bar",label:"Injetada",data:concD,backgroundColor:C.bar,borderWidth:0,order:5},
        {type:"line",label:"Contratual",data:ctD,borderColor:C.goldL,borderWidth:2,borderDash:[5,3],pointRadius:0,tension:.3,fill:false,order:1,hidden:false},
        {type:"line",label:"P50",data:p50D,borderColor:C.green,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true},
        {type:"line",label:"P75",data:p75D,borderColor:C.blue,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:3,hidden:true},
        {type:"line",label:"Media P50-P75",data:medD,borderColor:C.purple,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:4,hidden:true,borderDash:[2,3]}
      ]},
      options:chartOpts(function(v){return v!=null?v.toLocaleString("pt-BR",{maximumFractionDigits:1})+" MWh":"";})
    });
    setupToggle("ect"+name,charts[eid],1);
    setupToggle("ep50"+name,charts[eid],2);
    setupToggle("ep75"+name,charts[eid],3);
    setupToggle("emed"+name,charts[eid],4);
  },50);

  var recD=rows.map(function(r){return r.conc!=null&&r.vur!=null?r.conc*r.vur/1000:null;});
  var restD=rows.map(function(r){return r.contrat>0&&r.vur!=null?r.contrat*r.vur/1000:null;});
  var fid="fc"+name.replace(/[^a-z0-9]/gi,"");
  var fc=document.createElement("div");fc.className="cc";
  fc.innerHTML='<div class="ct">Receita Estimada (R$ mil)</div><div class="cto"><button class="tb on" id="fct'+name+'">Contratual x VUR</button></div><div class="cw" style="height:220px"><canvas id="'+fid+'"></canvas></div>';
  el.appendChild(fc);
  setTimeout(function(){
    var ctx=document.getElementById(fid);if(!ctx)return;
    charts[fid]=new Chart(ctx,{
      data:{labels:labels,datasets:[
        {type:"bar",label:"Receita Real",data:recD,backgroundColor:C.bar,borderWidth:0,order:2},
        {type:"line",label:"Contratual x VUR",data:restD,borderColor:C.goldL,borderWidth:2,borderDash:[5,3],pointRadius:0,tension:.3,fill:false,order:1}
      ]},
      options:chartOpts(function(v){return v!=null?"R$"+v.toFixed(1)+"k":"";})
    });
    setupToggle("fct"+name,charts[fid],1);
  },80);

  var dvEl=document.createElement("div");dvEl.className="dv";el.appendChild(dvEl);
  var tt=document.createElement("div");tt.className="st";tt.style.fontSize="15px";tt.textContent="Historico Mensal (completo)";el.appendChild(tt);
  var hasComp=allRows.some(function(r){return r.comp!=null;});
  var hasVur=allRows.some(function(r){return r.vur!=null;});
  var tbody="";
  var rev=allRows.slice().reverse();
  for(var i=0;i<rev.length;i++){
    var r=rev[i];
    if(r.conc==null&&r.contrat==null)continue;
    var rt=r.contrat>0?r.conc/r.contrat:null,dv2=rt!=null?(rt-1)*100:null;
    tbody+="<tr><td>"+r.dateStr+"</td><td>"+(r.conc!=null?fmtMWh(r.conc):"--")+"</td><td>"+(r.contrat>0?fmtMWh(r.contrat):"--")+"</td><td>"+(r.p50!=null?fmtMWh(r.p50):"--")+"</td><td style='color:var(--gold-light);font-weight:600'>"+(rt!=null?fmtPct(rt):"--")+"</td><td class='"+devCls(dv2)+"'>"+(dv2!=null?(dv2>=0?"+":"")+dv2.toFixed(1)+"%":"--")+"</td>"+(hasComp?"<td>"+(r.comp!=null?fmtMWh(r.comp):"--")+"</td>":"")+(hasVur?"<td>"+(r.vur!=null?"R$ "+r.vur.toFixed(4):"--")+"</td>":"")+"</tr>";
  }
  var tc=document.createElement("div");tc.className="tcard";
  tc.innerHTML='<div class="tsc"><table><thead><tr><th style="text-align:left">Mes</th><th>Injetada</th><th>Contratual</th><th>P50</th><th>Performance</th><th>Desvio</th>'+(hasComp?"<th>Compensada</th>":"")+(hasVur?"<th>VUR</th>":"")+'</tr></thead><tbody>'+tbody+'</tbody></table></div>';
  el.appendChild(tc);
}

function renderGrupo(el){
  var title=document.createElement("div");title.className="st";title.textContent="Analise por Grupo";el.appendChild(title);
  var allUsinas=SHEETS.filter(function(n){return allData[n]&&allData[n].length>0;});
  // Checkboxes
  var selDiv=document.createElement("div");
  selDiv.style.cssText="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;";
  var selLabel=document.createElement("div");selLabel.className="ct";selLabel.textContent="Selecione as usinas";
  selDiv.appendChild(selLabel);
  var cbDiv=document.createElement("div");cbDiv.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;";
  allUsinas.forEach(function(name){
    var lbl=document.createElement("label");
    lbl.style.cssText="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px;color:var(--text2);padding:5px 10px;border:1px solid var(--border2);border-radius:2px;background:var(--bg4);";
    var cb=document.createElement("input");cb.type="checkbox";cb.value=name;cb.style.accentColor="var(--gold)";
    lbl.appendChild(cb);lbl.appendChild(document.createTextNode(displayName(name)));
    cbDiv.appendChild(lbl);
  });
  selDiv.appendChild(cbDiv);
  var applyBtn=document.createElement("button");applyBtn.className="btn bgo";applyBtn.textContent="Aplicar";
  selDiv.appendChild(applyBtn);
  el.appendChild(selDiv);
  var resultDiv=document.createElement("div");el.appendChild(resultDiv);
  applyBtn.onclick=function(){
    var selected=Array.from(cbDiv.querySelectorAll("input:checked")).map(function(cb){return cb.value;});
    resultDiv.innerHTML="";
    Object.keys(charts).forEach(killChart);
    if(!selected.length){
      resultDiv.innerHTML='<div style="color:var(--text3);padding:16px">Selecione ao menos uma usina.</div>';
      return;
    }
    // KPIs
    var totC=0,totCt=0,totCp=0,totRec=0;
    var mmap={};
    selected.forEach(function(name){
      var rows=applyFilter(allData[name]);
      rows.forEach(function(r){
        if(r.conc!=null)totC+=r.conc;
        if(r.contrat!=null)totCt+=r.contrat;
        if(r.comp!=null)totCp+=r.comp;
        if(r.conc!=null&&r.vur!=null)totRec+=r.conc*r.vur;
        var k=r.dateStr;
        if(!mmap[k])mmap[k]={date:r.date,dateStr:r.dateStr,conc:0,contrat:0,p50:0,p50n:0,p75:0,p75n:0,media:0,median:0};
        if(r.conc!=null)mmap[k].conc+=r.conc;
        if(r.contrat!=null)mmap[k].contrat+=r.contrat;
        if(r.p50!=null){mmap[k].p50+=r.p50;mmap[k].p50n++;}
        if(r.p75!=null){mmap[k].p75+=r.p75;mmap[k].p75n++;}
        if(r.media!=null){mmap[k].media+=r.media;mmap[k].median++;}
      });
    });
    var ratio=totCt>0?totC/totCt:null;
    var devPct=ratio!=null?(ratio-1)*100:null;
    var kg=document.createElement("div");kg.className="kg";
    function kcard(label,val,unit,sub){return'<div class="kc"><div class="kl">'+label+'</div><div class="kv">'+val+'<span class="ku">'+unit+'</span></div><div class="ks">'+sub+'</div></div>';}
    kg.innerHTML=
      kcard("Energia Total Injetada",(totC/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}),"MWh","Concessionaria - periodo filtrado")+
      kcard("Energia Contratual",(totCt/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}),"MWh","Total contratado no periodo")+
      kcard("Energia Compensada",(totCp/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}),"MWh","Total compensada no periodo")+
      kcard("Receita Total Estimada",fmtBRL(totRec),"","VUR x Criterio de remuneracao")+
      '<div class="kc"><div class="kl">Performance Geral</div><div class="kd">'+(devPct!=null?(devPct>=0?"+":"")+devPct.toFixed(1)+"%":"--")+'</div><div class="kp '+devCls(devPct)+'">'+(ratio!=null?fmtPct(ratio)+" do contratual":"--")+'</div></div>';
    resultDiv.appendChild(kg);
    // Chart
    var months=Object.values(mmap).sort(function(a,b){return a.date-b.date;});
    var labels=months.map(function(m){return m.dateStr;});
    var concArr=months.map(function(m){return m.conc/1000;});
    var ctArr=months.map(function(m){return m.contrat>0?m.contrat/1000:null;});
    var p50Arr=months.map(function(m){return m.p50n>0?m.p50/1000:null;});
    var p75Arr=months.map(function(m){return m.p75n>0?m.p75/1000:null;});
    var mediaArr=months.map(function(m){return m.median>0?m.media/1000:null;});
    var gc=document.createElement("div");gc.className="cc";
    gc.innerHTML='<div class="ct">Geracao Consolidada (MWh)</div><div class="cto"><button class="tb on" id="ggct">Contratual</button><button class="tb" id="ggp50">P50</button><button class="tb" id="ggp75">P75</button><button class="tb" id="ggmed">Media P50-P75</button></div>';
    var gcw=document.createElement("div");gcw.className="cw";gcw.style.height="260px";
    var gcv=document.createElement("canvas");
    gcw.appendChild(gcv);gc.appendChild(gcw);
    resultDiv.appendChild(gc);
    setTimeout(function(){
      charts["gg"]=new Chart(gcv,{
        data:{labels:labels,datasets:[
          {type:"bar",label:"Injetada",data:concArr,backgroundColor:C.bar,borderWidth:0,order:3},
          {type:"line",label:"Contratual",data:ctArr,borderColor:C.goldL,borderWidth:2,borderDash:[5,3],pointRadius:0,tension:.3,fill:false,order:1},
          {type:"line",label:"P50",data:p50Arr,borderColor:C.green,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true},
          {type:"line",label:"P75",data:p75Arr,borderColor:C.purple,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true},
          {type:"line",label:"Media P50-P75",data:mediaArr,borderColor:C.blue,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,order:2,hidden:true}
        ]},
        options:chartOpts(function(v){return v!=null?v.toLocaleString("pt-BR",{maximumFractionDigits:1})+" MWh":"";})
      });
      setupToggle("ggct",charts["gg"],1);
      setupToggle("ggp50",charts["gg"],2);
      setupToggle("ggp75",charts["gg"],3);
      setupToggle("ggmed",charts["gg"],4);
    },50);
    // Resumo por usina
    var dv=document.createElement("div");dv.className="dv";resultDiv.appendChild(dv);
    var tt=document.createElement("div");tt.className="st";tt.style.fontSize="16px";tt.textContent="Resumo por Usina";resultDiv.appendChild(tt);
    var tbody="";
    selected.forEach(function(name){
      var rows=applyFilter(allData[name]);
      var c=sum(rows,"conc"),ct=sum(rows,"contrat"),rx=rows.reduce(function(a,r){return a+(r.conc&&r.vur?r.conc*r.vur:0);},0);
      var rt=ct>0?c/ct:null,dv2=rt!=null?(rt-1)*100:null;
      var lastReal=null;for(var i=rows.length-1;i>=0;i--){if(rows[i].conc!=null){lastReal=rows[i];break;}}
      tbody+="<tr><td>"+displayName(name)+"</td><td>"+(c/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" MWh</td><td>"+(ct>0?(ct/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" MWh":"--")+"</td><td style='color:var(--gold-light);font-weight:600'>"+(rt!=null?fmtPct(rt):"--")+"</td><td class='"+devCls(dv2)+"'>"+(dv2!=null?(dv2>=0?"+":"")+dv2.toFixed(1)+"%":"--")+"</td><td>"+fmtBRL(rx)+"</td><td>"+(lastReal?lastReal.dateStr:"--")+"</td></tr>";
    });
    var tc=document.createElement("div");tc.className="tcard";
    tc.innerHTML='<div class="tsc"><table><thead><tr><th style="text-align:left">Usina</th><th>Injetada</th><th>Contratual</th><th>Performance</th><th>Desvio</th><th>Receita Est.</th><th>Ultimo mes</th></tr></thead><tbody>'+tbody+'</tbody></table></div>';
    resultDiv.appendChild(tc);
  };
}

loadAll();
</script>
